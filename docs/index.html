(function(){
  const VER = '20260303-v14-final'; // 버전 업데이트
  if(location.search.includes('reset')){
    ['flyhome_regs','flyhome_emails','flyhome_count','flyhome_ver'].forEach(k=>localStorage.removeItem(k));
    history.replaceState(null,'',location.pathname);
    document.addEventListener('DOMContentLoaded',function(){
      const b=document.createElement('div');
      b.style.cssText='position:fixed;top:50px;left:0;right:0;z-index:9999;background:#1a7f4b;color:#fff;text-align:center;padding:14px;font-size:14px;font-family:DM Sans,sans-serif;font-weight:600;';

      document.body.appendChild(b);
      setTimeout(()=>b.remove(),4000);
    });
  }
  const saved = localStorage.getItem('flyhome_ver');
  if(saved && saved !== VER){
    localStorage.setItem('flyhome_ver', VER);
    location.reload(true);
  } else {
    localStorage.setItem('flyhome_ver', VER);
  }
})();

/* ── 수정 포인트 2: submitForm (외국인 국적 선택 팝업) ── */
async function submitReg(){
  const n=document.getElementById('gName').value.trim();
  const e=document.getElementById('gEmail').value.trim();
  const nation=document.getElementById('gNation').value;
  const date=document.getElementById('gDate').value;

  // 유효성 검사
  let valid=true;
  ['gName','gEmail','gNation'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el.value.trim()){el.classList.add('error');valid=false;}
    else el.classList.remove('error');
  });
  if(!valid){alert(t('validErr'));return;}

  // [신규] 한국어 페이지에서 외국 국적 선택 시 안내 팝업
  if(lang === 'ko' && !nation.includes('한국')) {
    alert("알림: 외국 국적 소지자이신 경우, 해당 국가의 언어 페이지(English, Japanese, Chinese)에서 신청하셔야 '무료 1박 혜택' 대상자로 정상 분류됩니다. 현재 한국어 페이지에서는 한국인 전용 안내가 제공됩니다.");
  }

  // (이후 저장 로직 동일)
  // ... 중략 ...
  const countryCode=nationMap[nation]||'XX';
  const rand=Date.now().toString(36).toUpperCase().slice(-3)+Math.random().toString(36).substr(2,2).toUpperCase();
  const code='FHF-'+countryCode+'-'+rand;

  const koreanDomains=['naver.com','daum.net','kakao.com','hanmail.net','nate.com','korea.com','paran.com','dreamwiz.com'];
  const emailDomain=(e.split('@')[1]||'').toLowerCase();
  const isKorean = (countryCode === 'KR') || koreanDomains.includes(emailDomain) || (lang === 'ko');
  const isOverLimit = parseInt(localStorage.getItem('flyhome_count')||'0') >= TOTAL_SLOTS;

  const payload={
    name:n, email:e, nation, date, lang,
    score:st.score, passed:(st.score>=PASS && !isOverLimit && !isKorean),
    overLimit:isOverLimit||isKorean, code,
    ts:new Date().toISOString(), action:'REGISTER'
  };

  st.name=n; st.email=e; st.bookCode=code; st.overLimit=isOverLimit||isKorean; st.alreadyBooked=true;

  // 로컬 저장 및 GAS 전송
  localStorage.setItem('flyhome_regs', JSON.stringify([...JSON.parse(localStorage.getItem('flyhome_regs')||'[]'), payload]));
  fetch(GAS_URL,{method:'POST',mode:'no-cors',body:JSON.stringify(payload)});

  st.phase='confirm'; render(); goToSection("#quizSection");
}

/* ── 수정 포인트 3: showUpgradedConfirm (재도전 로직 & 전송) ── */
window.showUpgradedConfirm = function(){
  const koreanDomains = ['naver.com','daum.net','kakao.com','hanmail.net','nate.com','korea.com','paran.com','dreamwiz.com'];
  const emailDomain = (st.email.split('@')[1] || '').toLowerCase();
  const isKR = (lang === 'ko' || st.nation.includes('한국') || koreanDomains.includes(emailDomain));

  st.overLimit = isKR ? true : false; 

  if(typeof GAS_URL !== 'undefined'){
    fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({
        code: st.bookCode, email: st.email, name: st.name,
        action: 'RETRY_SUCCESS', isKorean: isKR, lang: lang,
        timestamp: new Date().toISOString()
      })
    });
  }

  st.phase = 'confirm';
  render();
  if(typeof goToSection === 'function') goToSection('#quizSection');
};
